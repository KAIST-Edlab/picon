<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="{{ '/' | relative_url }}" class="sidebar-logo">PICon</a>
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>

  <ul class="sidebar-nav" id="sidebar-nav">
    {% for item in site.nav %}
    <li class="nav-item {% if page.url == item.url %}active{% endif %}">
      <a href="{{ item.url | relative_url }}" class="nav-link">{{ item.title }}</a>
      {% if item.children %}
      <ul class="nav-children">
        {% for child in item.children %}
        <li class="nav-child {% if page.url == child.url %}active{% endif %}">
          <a href="{{ child.url | relative_url }}">{{ child.title }}</a>
        </li>
        {% endfor %}
      </ul>
      {% endif %}
    </li>
    {% endfor %}
  </ul>

  <div class="sidebar-footer">
    <a href="https://github.com/YOUR_USERNAME/picon_web" class="sidebar-link" target="_blank">GitHub</a>
    <a href="https://arxiv.org/abs/XXXX.XXXXX" class="sidebar-link" target="_blank">arXiv</a>
  </div>
</nav>

<script>
  const toggle = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('sidebar');
  const nav = document.getElementById('sidebar-nav');
  toggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });
</script>
