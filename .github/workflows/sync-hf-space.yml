name: Sync to HF Space

on:
  push:
    branches: [main]
    paths:
      - "hf_space/**"
      - "assets/css/style.css"
      - "assets/js/demo.js"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Assemble Space files
        run: |
          mkdir -p hf_space/assets/css hf_space/assets/js
          cp assets/css/style.css hf_space/assets/css/
          cp assets/js/demo.js hf_space/assets/js/

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="hf_space",
              repo_id="KAISTEdlab/picon-demo",
              repo_type="space",
              commit_message="Sync from GitHub",
          )
          EOF
