title: "PICon"
description: "A Multi-Turn Interrogation Framework for Evaluating Persona Agent Consistency"
url: "" # Set to your GitHub Pages URL, e.g. https://username.github.io
baseurl: "/picon_web" # Repository name

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation order
nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: Demo
    url: /demo/
  - title: Contact / Cite
    url: /contact/

# Demo backend
demo_api_url: "https://your-app.railway.app" # Update with your Railway URL

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - api
