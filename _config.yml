title: "PICon"
description: "A Multi-Turn Interrogation Framework for Evaluating Persona Agent Consistency"
url: "https://kaist-edlab.github.io"
baseurl: "/picon.github.io"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation order
nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: Demo
    url: /demo/
  - title: Contact / Cite
    url: /contact/

# Demo backend
demo_api_url: "https://picongithubio-production.up.railway.app"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - api
